# Site and content
site_name: "Safespring documentation"
docs_dir: "content"

# Github integration
repo_name: "safespring/docs"
repo_url: "https://github.com/safespring/docs"
edit_uri: "edit/master/content/"

# Safespring theme
theme:
  name: "material"
  custom_dir: "overrides"
  logo: "safespring_symbol_white_svg.svg"
  favicon: "favicon.ico"
  font:
    text: "Montserrat"
    code: "Intel One Mono"
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.footer
extra_css:
  - "safespring.css"
extra:
  generator: false
  safespring_services:
    - "Backup"
    - "Compute"
    - "Storage"
    - "On-demand Kubernetes"
    - "Self-service Portal & API"
    - "Status and support"
  safespring_services_menu:
    - "Backup"
    - "Compute"
    - "Storage"
    - "On-demand Kubernetes"
    - "Status and support"
  safespring_top_nav:
    - "On-demand Kubernetes"
    - "Compute"
    - "Storage"
    - "Backup"
  safespring_top_nav_labels:
    On-demand Kubernetes: "Kubernetes"
  safespring_more_menu_exclude:
    - "Overview"
    - "On-demand Kubernetes"
    - "Compute"
    - "Storage"
    - "Backup"
    - "Self-service Portal & API"
extra_javascript:
  - "https://lbpj80qtys85.statuspage.io/embed/script.js"
  - "javascripts/mermaid-viewer.js"
  - "safespring-codeblocks.js"

hooks:
  - hooks/legacy_tabbed_fences.py

# https://squidfunk.github.io/mkdocs-material/setup/extensions/
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      guess_lang: false
  - pymdownx.tabbed:
      alternate_style: true
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: safespring-mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

